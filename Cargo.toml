[package]
name = "ezpn"
version = "0.2.0"
edition = "2021"
rust-version = "1.70"
autobins = false
description = "Dead simple terminal pane splitting — ezpn 2 3 gives you a 2x3 grid of shells"
license = "MIT"
readme = "README.md"
repository = "https://github.com/subinium/ezpn"
homepage = "https://github.com/subinium/ezpn"
keywords = ["terminal", "pane", "multiplexer", "tui", "cli"]
categories = ["command-line-utilities"]

[[bin]]
name = "ezpn"
path = "src/main.rs"

[[bin]]
name = "ezpn-ctl"
path = "src/bin/ezpn-ctl.rs"

[dependencies]
portable-pty = "0.8"
vt100 = "0.15"
crossterm = "0.28"
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
